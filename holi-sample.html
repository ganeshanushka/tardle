<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tar.dle – Holi Sample</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: #f5f5f5;
    }
    .title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      height: clamp(50px, 8vh, 60px);
      min-height: 50px;
      background-color: #7BAFD4;
      padding: 0 clamp(10px, 2vw, 20px);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-sizing: border-box;
      margin: 0;
    }
    .hamburger-menu {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      padding: 8px;
      background: none;
      border: none;
    }
    .hamburger-menu span {
      width: 20px;
      height: 2px;
      background: #fff;
      display: block;
    }
    .title-text {
      font-family: 'Field Gothic Narrow', sans-serif;
      font-weight: bold;
      font-size: clamp(24px, 4vw, 32px);
      color: white;
    }
    .header-icons {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .header-icon {
      width: 22px;
      height: 22px;
      cursor: pointer;
      color: white;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      max-width: min(700px, 95vw);
      width: 100%;
      font-family: 'Field Gothic Narrow', sans-serif;
      margin-top: 80px;
      position: relative;
    }

    /* Large organic paint splatters */
    .splash-bg {
      position: absolute;
      pointer-events: none;
      z-index: 0;
    }
    .splash-1 {
      width: 180px;
      height: 180px;
      background: #E91E63;
      border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
      opacity: 0.5;
      top: -20px;
      right: -40px;
    }
    .splash-2 {
      width: 160px;
      height: 160px;
      background: #00BCD4;
      border-radius: 40% 60% 50% 50% / 60% 40% 60% 40%;
      opacity: 0.55;
      top: 80px;
      left: -60px;
    }
    .splash-3 {
      width: 140px;
      height: 140px;
      background: #64B5F6;
      border-radius: 50% 50% 40% 60% / 50% 60% 50% 40%;
      opacity: 0.5;
      bottom: 60px;
      left: -30px;
    }
    .splash-4 {
      width: 150px;
      height: 150px;
      background: #FFEB3B;
      border-radius: 60% 40% 50% 50% / 40% 60% 50% 50%;
      opacity: 0.55;
      bottom: 40px;
      right: -50px;
    }
    .splash-5 {
      width: 100px;
      height: 100px;
      background: #F06292;
      border-radius: 50% 60% 40% 50% / 50% 50% 60% 40%;
      opacity: 0.45;
      top: 120px;
      right: 20px;
    }
    .splash-6 {
      width: 90px;
      height: 90px;
      background: #4DD0E1;
      border-radius: 40% 60% 60% 40% / 50% 50% 50% 50%;
      opacity: 0.5;
      bottom: 140px;
      right: -20px;
    }

    .guess-grid-wrapper {
      position: relative;
      z-index: 1;
      display: inline-block;
      margin: 0 auto;
    }

    .unc-badge {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1b;
      color: white;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 4px;
    }

    #guessGrid {
      text-align: center;
      margin: 0 auto;
      line-height: 0;
      width: fit-content;
    }
    #guessGrid br { line-height: 0; }

    .guess-grid-wrapper .key-guess {
      border: 1px solid #b8c4ce;
    }

    .see-results-btn {
      margin-top: 24px;
      padding: 12px 32px;
      font-family: 'Field Gothic Narrow', sans-serif;
      font-weight: bold;
      font-size: 16px;
      background-color: #7BAFD4;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="title-bar">
    <div class="hamburger-menu">
      <span></span><span></span><span></span>
    </div>
    <div class="title-text">Tar.dle</div>
    <div class="header-icons">
      <span class="header-icon">📊</span>
      <span class="header-icon">?</span>
      <span class="header-icon">⚙</span>
      <span class="header-icon">✕</span>
    </div>
  </div>

  <div class="container">
    <div class="splash-bg splash-1"></div>
    <div class="splash-bg splash-2"></div>
    <div class="splash-bg splash-3"></div>
    <div class="splash-bg splash-4"></div>
    <div class="splash-bg splash-5"></div>
    <div class="splash-bg splash-6"></div>

    <div id="guessGridWrapper" class="guess-grid-wrapper">
      <span class="unc-badge">UNC</span>
      <div id="guessGrid"></div>
    </div>
    <button class="see-results-btn">See results</button>
  </div>

  <script>
    const gridData = [
      { letters: ['A', 'T', 'E'], classes: ['wrong', 'wrong', 'wrong'] },
      { letters: ['H', 'E', 'R'], classes: ['wrong', 'wrong', 'wrong'] },
      { letters: ['S', 'A', 'W'], classes: ['wrong', 'wrong', 'wrong'] },
      { letters: ['D', 'O', 'T'], classes: ['wrong', 'wrong', 'wrong'] },
      { letters: ['Y', 'O', 'U'], classes: ['wrong', 'found', 'found'] },
      { letters: ['M', 'U', 'N'], classes: ['found', 'found', 'found'] }
    ];

    const guessGrid = document.getElementById('guessGrid');
    gridData.forEach((row, i) => {
      row.letters.forEach((letter, j) => {
        const cell = document.createElement('div');
        cell.id = i + '' + j;
        cell.className = 'key-guess ' + row.classes[j];
        cell.textContent = letter;
        guessGrid.appendChild(cell);
      });
      guessGrid.appendChild(document.createElement('br'));
    });
  </script>
</body>
</html>
