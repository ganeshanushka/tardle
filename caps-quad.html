<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Tar.dle – Holi Tiles</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .tile-row {
      display: flex;
    }
    .tile {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 60px;
      height: 60px;
      margin: 2px;
      background-color: #7BAFD4; /* Carolina blue */
      color: #ffffff;
      font-size: 32px;
      font-weight: 700;
      text-transform: uppercase;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <!-- Holi tiles (Wilson was replaced) -->
  <div class="tile-row">
    <div class="tile">H</div>
    <div class="tile">O</div>
    <div class="tile">L</div>
    <div class="tile">I</div>
  </div>
</body>
</html>
