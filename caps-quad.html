<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tar.dle - Caps Quad</title>
  <style>
    :root {
      --carolina: #74a9d4;
      --bg: #e7e7e7;
      --tile-border: #c8c8c8;
      --key-bg: #cbccd1;
      --text-dark: #232323;
      --white: #ffffff;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
    }

    .topbar {
      width: 100%;
      height: 52px;
      background: var(--carolina);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      box-sizing: border-box;
    }

    .title {
      font-size: 45px;
      line-height: 1;
      font-weight: 700;
    }

    .icon-group {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 30px;
      font-weight: 600;
    }

    .icon {
      width: 22px;
      text-align: center;
    }

    .board {
      margin-top: 64px;
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 4px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .tile {
      width: 44px;
      height: 44px;
      border: 2px solid var(--tile-border);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-dark);
      box-sizing: border-box;
    }

    .keyboard {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .key-row {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .key {
      min-width: 43px;
      height: 40px;
      border: none;
      border-radius: 3px;
      background: var(--key-bg);
      color: var(--text-dark);
      font-size: 30px;
      font-weight: 700;
      padding: 0 7px;
    }

    .key.wide {
      min-width: 82px;
      font-size: 30px;
    }

    @media (max-width: 760px) {
      .title {
        font-size: 34px;
      }

      .tile {
        width: 36px;
        height: 36px;
        font-size: 20px;
      }

      .key {
        min-width: 30px;
        height: 36px;
        font-size: 18px;
        padding: 0 6px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="icon">&#9776;</div>
      <div class="title">Tar.dle</div>
      <div class="icon-group">
        <div class="icon">&#9903;</div>
        <div class="icon">&#8857;</div>
        <div class="icon">&#9881;</div>
        <div class="icon">X</div>
      </div>
    </header>

    <section class="board" aria-label="Guess board">
      <div class="row">
        <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
      </div>
      <div class="row">
        <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
      </div>
      <div class="row">
        <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
      </div>
      <div class="row">
        <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
      </div>
      <div class="row">
        <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
      </div>
      <div class="row">
        <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
      </div>
    </section>

    <section class="keyboard" aria-label="On-screen keyboard">
      <div class="key-row">
        <button class="key">Q</button><button class="key">W</button><button class="key">E</button><button class="key">R</button><button class="key">T</button><button class="key">Y</button><button class="key">U</button><button class="key">I</button><button class="key">O</button><button class="key">P</button>
      </div>
      <div class="key-row">
        <button class="key">A</button><button class="key">S</button><button class="key">D</button><button class="key">F</button><button class="key">G</button><button class="key">H</button><button class="key">J</button><button class="key">K</button><button class="key">L</button>
      </div>
      <div class="key-row">
        <button class="key wide">ENTER</button><button class="key">Z</button><button class="key">X</button><button class="key">C</button><button class="key">V</button><button class="key">B</button><button class="key">N</button><button class="key">M</button><button class="key">⌫</button>
      </div>
    </section>
  </div>
</body>
</html>
